<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Opportunity Details - Helpinghands</title>
<link href="https://fonts.googleapis.com/css2?family=Clash+Display:wght@400;500;600;700&family=Satoshi:wght@400;500;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --primary: #0F4C3A;
    --primary-light: #1A6B4F;
    --primary-glow: rgba(15, 76, 58, 0.06);
    --accent: #E85D3A;
    --accent-glow: rgba(232, 93, 58, 0.06);
    --gold: #D4A017;
    --gold-glow: rgba(212, 160, 23, 0.08);
    --purple: #5B4FA1;
    --purple-glow: rgba(91, 79, 161, 0.05);
    --bg: #F7F8FA;
    --bg2: #FFFFFF;
    --bg3: #EDEFF3;
    --slate: #6B7280;
    --slate2: #9CA3AF;
    --white: #FFFFFF;
    --text: #111827;
    --text2: #4B5563;
    --border: rgba(0, 0, 0, 0.06);
    --border2: rgba(0, 0, 0, 0.1);
    --shadow-sm: 0 1px 2px rgba(0, 0, 0, 0.04);
    --shadow-md: 0 4px 12px rgba(0, 0, 0, 0.06);
    --shadow-lg: 0 8px 32px rgba(0, 0, 0, 0.08);
    --shadow-xl: 0 16px 48px rgba(0, 0, 0, 0.12);
    --r8: 8px;
    --r12: 12px;
    --r16: 16px;
    --r20: 20px;
  }

  body {
    font-family: 'Satoshi', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    overflow-x: hidden;
    -webkit-font-smoothing: antialiased;
  }

  .bg-mesh { position: fixed; inset: 0; z-index: 0; pointer-events: none; overflow: hidden; }
  .bg-mesh::before { content: ''; position: absolute; top: -40%; left: -20%; width: 80%; height: 80%; background: radial-gradient(ellipse, rgba(15, 76, 58, 0.03) 0%, transparent 70%); }
  .bg-mesh::after { content: ''; position: absolute; bottom: -30%; right: -15%; width: 70%; height: 70%; background: radial-gradient(ellipse, rgba(91, 79, 161, 0.025) 0%, transparent 70%); }
  .bg-dots { position: fixed; inset: 0; z-index: 0; pointer-events: none; background-image: radial-gradient(circle, rgba(0, 0, 0, 0.03) 1px, transparent 1px); background-size: 28px 28px; }

  @keyframes fadeUp { from { opacity: 0; transform: translateY(16px); } to { opacity: 1; transform: translateY(0); } }
  @keyframes resultPopIn { 0% { opacity: 0; transform: translateY(20px) scale(0.95); } 60% { opacity: 1; transform: translateY(-4px) scale(1.02); } 100% { opacity: 1; transform: translateY(0) scale(1); } }
  @keyframes slideInRight { from { opacity: 0; transform: translateX(20px); } to { opacity: 1; transform: translateX(0); } }

  .shell { position: relative; z-index: 1; display: flex; flex-direction: column; min-height: 100vh; }

  header {
    padding: 0 2rem;
    height: 64px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    border-bottom: 1px solid var(--border);
    backdrop-filter: blur(20px);
    background: rgba(255, 255, 255, 0.9);
    position: sticky;
    top: 0;
    z-index: 100;
    box-shadow: var(--shadow-sm);
  }
  .logo { display: flex; align-items: center; gap: 10px; font-family: 'Clash Display', sans-serif; font-weight: 700; font-size: 1.3rem; color: var(--primary); text-decoration: none; }
  .logo-icon { width: 36px; height: 36px; background: linear-gradient(135deg, var(--primary), var(--primary-light)); border-radius: 10px; display: flex; align-items: center; justify-content: center; font-size: 18px; color: #fff; box-shadow: 0 2px 12px rgba(15, 76, 58, 0.2); transition: transform 0.2s ease; }
  .logo:hover .logo-icon { transform: rotate(-5deg) scale(1.05); }
  .logo span { color: var(--primary-light); }
  .header-actions { display: flex; align-items: center; gap: 10px; }
  .btn-sm { padding: 7px 16px; border-radius: var(--r8); border: 1px solid var(--border2); background: var(--white); color: var(--text2); font-size: 13px; font-weight: 500; cursor: pointer; transition: all 0.25s ease; white-space: nowrap; text-decoration: none; box-shadow: var(--shadow-sm); }
  .btn-sm:hover { background: var(--bg3); color: var(--text); border-color: rgba(0, 0, 0, 0.15); box-shadow: var(--shadow-md); transform: translateY(-1px); }
  .btn-primary { background: linear-gradient(135deg, var(--primary), var(--primary-light)); border-color: transparent; color: #fff; font-weight: 600; box-shadow: 0 2px 12px rgba(15, 76, 58, 0.25); }
  .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 6px 24px rgba(15, 76, 58, 0.35); color: #fff; }
  .notif { width: 36px; height: 36px; border-radius: var(--r8); border: 1px solid var(--border2); background: var(--white); display: flex; align-items: center; justify-content: center; cursor: pointer; position: relative; font-size: 16px; text-decoration: none; box-shadow: var(--shadow-sm); transition: all 0.2s ease; }
  .notif:hover { background: var(--bg3); transform: scale(0.98); }
  .notif-dot { position: absolute; top: 7px; right: 8px; width: 6px; height: 6px; background: var(--accent); border-radius: 50%; border: 1.5px solid #fff; }

  /* Profile Section */
  .profile-section {
    display: flex;
    align-items: center;
    gap: 12px;
    cursor: pointer;
    padding: 4px 16px 4px 8px;
    border-radius: 980px;
    background: rgba(255, 255, 255, 0.9);
    transition: all 0.3s cubic-bezier(0.2, 0.9, 0.4, 1.1);
    border: 1px solid var(--border2);
    position: relative;
    animation: slideInRight 0.4s ease;
  }
  .profile-section:hover { background: white; box-shadow: var(--shadow-md); transform: translateY(-1px); }
  .profile-avatar { width: 36px; height: 36px; background: linear-gradient(135deg, var(--primary), var(--primary-light)); border-radius: 50%; display: flex; align-items: center; justify-content: center; color: white; font-weight: 700; font-size: 16px; box-shadow: 0 2px 8px rgba(15, 76, 58, 0.2); }
  .profile-info { text-align: left; }
  .profile-name { font-size: 13px; font-weight: 700; color: var(--text); line-height: 1.2; }
  .profile-type { font-size: 10px; color: var(--slate); font-weight: 500; }
  .profile-dropdown { position: absolute; top: calc(100% + 8px); right: 0; background: var(--white); border-radius: var(--r12); box-shadow: var(--shadow-xl); border: 1px solid var(--border); min-width: 220px; opacity: 0; visibility: hidden; transform: translateY(-10px); transition: all 0.25s ease; z-index: 200; overflow: hidden; }
  .profile-section.active .profile-dropdown { opacity: 1; visibility: visible; transform: translateY(0); }
  .dropdown-item { padding: 12px 16px; display: flex; align-items: center; gap: 12px; font-size: 13px; cursor: pointer; transition: background 0.2s; border-bottom: 1px solid var(--border); color: var(--text2); }
  .dropdown-item:last-child { border-bottom: none; }
  .dropdown-item:hover { background: var(--bg3); color: var(--primary); }
  .dropdown-item i { width: 20px; color: var(--primary-light); }

  nav { padding: 0 2rem; border-bottom: 1px solid var(--border); background: rgba(255, 255, 255, 0.85); backdrop-filter: blur(10px); display: flex; gap: 0; overflow-x: auto; box-shadow: var(--shadow-sm); }
  nav::-webkit-scrollbar { display: none; }
  .tab { padding: 16px 20px; font-size: 13.5px; font-weight: 500; color: var(--slate); cursor: pointer; border-bottom: 2px solid transparent; white-space: nowrap; transition: all 0.25s ease; display: flex; align-items: center; gap: 7px; text-decoration: none; }
  .tab:hover { color: var(--text); transform: translateY(-1px); }
  .tab.active { color: var(--primary); border-bottom-color: var(--primary); font-weight: 600; }
  .badge-count { background: var(--accent); color: white; font-size: 10px; font-weight: 700; padding: 1px 6px; border-radius: 20px; min-width: 18px; text-align: center; }
  .urgent-pulse { width: 7px; height: 7px; background: var(--accent); border-radius: 50%; animation: pulse 1.4s infinite; display: inline-block; }
  @keyframes pulse { 0%,100% { opacity: 1; transform: scale(1); } 50% { opacity: 0.5; transform: scale(1.4); } }

  main { flex: 1; padding: 2rem; max-width: 1100px; margin: 0 auto; width: 100%; }

  .breadcrumb { display: flex; align-items: center; gap: .5rem; margin-bottom: 1.5rem; font-size: 13px; color: var(--text2); animation: fadeUp .4s ease both; }
  .breadcrumb a { color: var(--primary); text-decoration: none; font-weight: 500; }
  .breadcrumb a:hover { text-decoration: underline; }

  .opportunity-hero { background: var(--bg2); border: 1px solid var(--border); border-radius: var(--r20); padding: 2rem; margin-bottom: 2rem; transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275), box-shadow 0.4s ease; position: relative; overflow: hidden; animation: resultPopIn .5s ease both; box-shadow: var(--shadow-sm); }
  .opportunity-hero:hover { transform: translateY(-5px) scale(1.01); box-shadow: var(--shadow-lg); background: #fcfdfc; }
  .opp-header { display: flex; justify-content: space-between; align-items: flex-start; flex-wrap: wrap; gap: 1.5rem; }
  .opp-title-section { flex: 1; }
  .opp-category { display: inline-flex; align-items: center; gap: 6px; padding: 5px 12px; border-radius: 20px; font-size: 11.5px; font-weight: 600; margin-bottom: 1rem; background: rgba(15, 76, 58, 0.06); color: var(--primary); border: 1px solid rgba(15, 76, 58, 0.15); }
  .opp-title { font-family: 'Clash Display', sans-serif; font-size: 2rem; font-weight: 700; line-height: 1.2; margin-bottom: .75rem; }
  .opp-ngo { display: flex; align-items: center; gap: .75rem; }
  .opp-ngo-avatar { width: 48px; height: 48px; border-radius: 12px; display: flex; align-items: center; justify-content: center; font-size: 22px; background: var(--bg3); transition: transform 0.35s ease; }
  .opp-ngo:hover .opp-ngo-avatar { transform: scale(1.05); }
  .opp-ngo-name { font-size: 15px; font-weight: 600; }
  .opp-ngo-verified { font-size: 12px; color: var(--primary-light); font-weight: 500; }
  .signup-card { background: var(--bg2); border: 1px solid var(--border); border-radius: var(--r16); padding: 1.5rem; min-width: 240px; text-align: center; transition: all 0.3s ease; box-shadow: var(--shadow-sm); }
  .signup-card:hover { transform: translateY(-3px); box-shadow: var(--shadow-lg); border-color: rgba(15, 76, 58, 0.15); }
  .signup-spots { font-family: 'Clash Display', sans-serif; font-size: 2rem; font-weight: 700; color: var(--primary); }
  .signup-total { font-size: 13px; color: var(--text2); margin-bottom: 1rem; }
  .progress-bar { height: 6px; background: var(--bg3); border-radius: 4px; margin-bottom: 1rem; overflow: hidden; }
  .progress-fill { height: 100%; border-radius: 4px; background: linear-gradient(90deg, var(--primary), var(--primary-light)); transition: width 0.8s cubic-bezier(.25, .8, .25, 1.2); width: 0%; }
  .btn-signup-large { padding: 12px 28px; border-radius: var(--r8); border: none; background: linear-gradient(135deg, var(--primary), var(--primary-light)); color: #fff; font-size: 15px; font-weight: 700; cursor: pointer; transition: all 0.3s; width: 100%; margin-bottom: .75rem; box-shadow: 0 2px 8px rgba(15, 76, 58, 0.2); }
  .btn-signup-large:hover { transform: scale(1.02); box-shadow: 0 6px 20px rgba(15, 76, 58, 0.4); }
  .btn-signup-large.signed { background: var(--bg3); color: var(--slate); cursor: default; pointer-events: none; }
  .xp-badge { font-size: 12px; color: var(--gold); font-weight: 600; }
  .share-buttons { display: flex; gap: .5rem; margin-top: .75rem; }
  .btn-share { padding: 6px 12px; border-radius: var(--r8); border: 1px solid var(--border2); background: var(--white); color: var(--text2); font-size: 11px; cursor: pointer; transition: all 0.25s ease; flex: 1; font-weight: 500; }
  .btn-share:hover { background: var(--bg3); transform: translateY(-1px); }
  .detail-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; margin-bottom: 2rem; }
  .detail-card { background: var(--bg2); border: 1px solid var(--border); border-radius: var(--r12); padding: 1.25rem; display: flex; align-items: center; gap: 1rem; transition: all 0.3s; box-shadow: var(--shadow-sm); }
  .detail-card:hover { transform: translateY(-3px); box-shadow: var(--shadow-md); background: #fcfdfc; }
  .detail-icon { font-size: 1.5rem; width: 40px; height: 40px; border-radius: 10px; display: flex; align-items: center; justify-content: center; background: var(--bg3); }
  .detail-label { font-size: 11px; color: var(--slate); text-transform: uppercase; letter-spacing: .05em; margin-bottom: .3rem; }
  .detail-value { font-size: 15px; font-weight: 600; color: var(--text); }
  .section-card { background: var(--bg2); border: 1px solid var(--border); border-radius: var(--r16); padding: 1.5rem; margin-bottom: 1.5rem; transition: all 0.3s; box-shadow: var(--shadow-sm); }
  .section-card:hover { transform: translateY(-3px); box-shadow: var(--shadow-md); }
  .section-title { font-family: 'Clash Display', sans-serif; font-size: 1.1rem; font-weight: 600; margin-bottom: 1rem; display: flex; align-items: center; gap: 8px; }
  .section-desc { font-size: 14px; color: var(--text2); line-height: 1.7; margin-bottom: 1rem; }
  .skills-list { display: flex; flex-wrap: wrap; gap: .5rem; }
  .skill-tag { padding: 6px 14px; border-radius: 20px; border: 1px solid var(--border2); background: var(--bg); font-size: 12.5px; color: var(--text2); transition: all 0.25s; }
  .skill-tag.highlight { background: rgba(15, 76, 58, 0.06); border-color: rgba(15, 76, 58, 0.2); color: var(--primary); font-weight: 500; }
  .agenda-item { display: flex; gap: 1rem; padding: .75rem 0; border-bottom: 1px solid var(--border); }
  .agenda-item:last-child { border-bottom: none; }
  .agenda-time { font-size: 12px; color: var(--primary); font-weight: 700; min-width: 80px; }
  .agenda-desc { font-size: 13.5px; color: var(--text); font-weight: 500; }
  .volunteers-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: .75rem; }
  .volunteer-card { background: var(--bg2); border: 1px solid var(--border); border-radius: var(--r12); padding: 1rem; display: flex; align-items: center; gap: .75rem; transition: all 0.3s; box-shadow: var(--shadow-sm); }
  .volunteer-card:hover { transform: translateY(-3px); box-shadow: var(--shadow-md); background: #fefefe; }
  .volunteer-avatar { width: 42px; height: 42px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 16px; font-weight: 700; }
  .volunteer-name { font-size: 14px; font-weight: 600; }
  .volunteer-role { font-size: 12px; color: var(--text2); }
  .toast { position: fixed; bottom: 2rem; right: 2rem; background: #fff; color: var(--primary); padding: 12px 22px; border-radius: var(--r12); font-weight: 600; font-size: 14px; z-index: 9999; transform: translateY(80px); opacity: 0; transition: all 0.35s; box-shadow: var(--shadow-xl); display: flex; align-items: center; gap: 8px; border: 1px solid var(--border); }
  .toast.show { transform: translateY(0); opacity: 1; }

  @media (max-width:768px) {
    .detail-grid { grid-template-columns: 1fr; }
    .opp-header { flex-direction: column; }
    .signup-card { width: 100%; }
    .opp-title { font-size: 1.6rem; }
    .opportunity-hero { padding: 1.5rem; }
    main { padding: 1rem; }
    header, nav { padding: 0 1rem; }
  }
</style>
</head>
<body>
<div class="bg-mesh"></div>
<div class="bg-dots"></div>
<div class="shell">

<header>
  <a href="index.html" class="logo"><div class="logo-icon">🌱</div>Helping<span>Hands</span></a>
  <div class="header-actions" id="headerActions"></div>
</header>

<nav>
  <a href="index.html" class="tab active"><span>🌍</span>Explore</a>
  <a href="urgent.html" class="tab urgent-tab"><span class="urgent-pulse"></span>Urgent<span class="badge-count">4</span></a>
  <a href="individual.html" class="tab"><span>🤝</span>Individuals</a>
  <a href="leaderboard.html" class="tab"><span>🏆</span>Leaderboard</a>
  <a href="post.html" class="tab"><span>✍️</span>Post Need</a>
</nav>

<main>
  <div class="breadcrumb"><a href="index.html">Home</a> <span>›</span> <a href="index.html">Explore</a> <span>›</span> <span id="breadcrumb-title">Opportunity Details</span></div>
  <div class="opportunity-hero" id="opportunityHero"></div>
  <div id="detailGridContainer"></div>
  <div class="section-card" id="aboutSection"><div class="section-title">📋 About This Opportunity</div><div class="section-desc" id="aboutDesc"></div><div class="section-title" style="margin-top:1.5rem">🛠 Skills Required</div><div class="skills-list" id="skillsList"></div></div>
  <div class="section-card"><div class="section-title">📅 Event Agenda</div><div id="eventAgenda"></div></div>
  <div class="section-card"><div class="section-title">👥 Joined Volunteers</div><div class="volunteers-grid" id="volunteersList"></div><div style="text-align:center;margin-top:1rem;font-size:13px;color:var(--text2)" id="volunteerCount"></div></div>
</main>
</div>

<div class="toast" id="toast"></div>

<script>
const OPPORTUNITIES_DB = {
  'river-cleanup': { id: 'river-cleanup', title: 'River Ganga Cleanup Drive', ngo: 'GreenEarth India', ngoEmoji: '🌿', ngoBg: 'rgba(15,76,58,0.08)', category: 'env', categoryLabel: 'Environment', description: 'Join our annual cleanup initiative.', longDescription: 'Over the past 3 years, we have removed over 50 tons of waste. This year, our goal is to expand to 5 new locations.', skills: ['Waste Management', 'Tree Planting', 'Community Outreach', 'Team Coordination', 'Physical Fitness'], location: 'Kolkata Riverfront (Near Howrah Bridge)', date: 'April 22, 2025', time: '6:00 AM - 12:00 PM', totalSpots: 20, filledSpots: 12, xpReward: 50, agenda: [{time:'6:00 AM',activity:'Registration & Briefing'},{time:'6:30 AM',activity:'Waste Collection'},{time:'8:30 AM',activity:'Break'},{time:'9:00 AM',activity:'Tree Plantation'},{time:'11:30 AM',activity:'Closing'}], volunteers: [{name:'Aryan Mehta',role:'Team Lead',avatar:'AM',color:'#D4A017',bg:'rgba(212,160,23,0.1)'},{name:'Sia Patel',role:'Coordinator',avatar:'SP',color:'#6B7280',bg:'rgba(107,114,128,0.1)'},{name:'Riya Kapoor',role:'Volunteer',avatar:'RK',color:'#B8860B',bg:'rgba(184,134,11,0.1)'}] },
  'medical-camp': { id: 'medical-camp', title: 'Free Medical Camp — Rural Areas', ngo: 'HealthBridge Foundation', ngoEmoji: '🏥', ngoBg: 'rgba(59,130,246,0.08)', category: 'med', categoryLabel: 'Healthcare', longDescription: 'HealthBridge Foundation serves 500+ patients. This camp offers general check-ups, eye exams, dental care.', skills: ['Patient Registration', 'Crowd Management', 'Basic First Aid', 'Data Entry'], location: 'Bardhaman Rural Health Center', date: 'April 25, 2025', time: '8:00 AM - 4:00 PM', totalSpots: 15, filledSpots: 10, xpReward: 75, agenda: [{time:'7:30 AM',activity:'Setup'},{time:'8:00 AM',activity:'Registration'},{time:'12:30 PM',activity:'Lunch'}], volunteers: [{name:'Dr. Sharma',role:'Lead Doctor',avatar:'DS',color:'#3B82F6',bg:'rgba(59,130,246,0.1)'}] },
  'digital-literacy': { id: 'digital-literacy', title: 'Digital Literacy Educators', ngo: 'EduForAll Trust', ngoEmoji: '📚', ngoBg: 'rgba(212,160,23,0.08)', category: 'edu', categoryLabel: 'Education', longDescription: 'Teach smartphone/internet skills to seniors and rural women. Materials provided.', skills: ['Teaching', 'Patience', 'Tech Basics', 'Communication'], location: 'Remote / Online', date: 'Starting May 3, 2025', time: 'Flexible', totalSpots: 30, filledSpots: 18, xpReward: 40, agenda: [{time:'Week 1',activity:'Orientation'},{time:'Week 2',activity:'Smartphone Basics'}], volunteers: [{name:'Tanvi R.',role:'Lead Educator',avatar:'TR',color:'#D4A017',bg:'rgba(212,160,23,0.1)'}] }
};
['code-camp','shelter-repair','tree-plantation','vaccination-drive','animal-rescue'].forEach(id => { if(!OPPORTUNITIES_DB[id]) OPPORTUNITIES_DB[id] = OPPORTUNITIES_DB['river-cleanup']; });

let currentOpportunity = null;
let isSignedUp = false;
let currentUser = null;

function getCategoryEmoji(cat) { const e = { env:'🌿', med:'🏥', edu:'📚', animal:'🐾', tech:'💻', shelter:'🏠' }; return e[cat] || '🤝'; }

function renderOpportunityDetails(opp) {
  currentOpportunity = opp;
  const spotsLeft = opp.totalSpots - opp.filledSpots;
  const fillPercent = (opp.filledSpots / opp.totalSpots) * 100;
  document.getElementById('breadcrumb-title').textContent = opp.title;
  document.getElementById('opportunityHero').innerHTML = `<div class="opp-header"><div class="opp-title-section"><div class="opp-category">${getCategoryEmoji(opp.category)} ${opp.categoryLabel}</div><h1 class="opp-title">${opp.title}</h1><div class="opp-ngo"><div class="opp-ngo-avatar" style="background:${opp.ngoBg}">${opp.ngoEmoji}</div><div><div class="opp-ngo-name">${opp.ngo}</div><div class="opp-ngo-verified">✓ Verified NGO</div></div></div></div><div class="signup-card"><div class="signup-spots">${spotsLeft}</div><div class="signup-total">spots left out of ${opp.totalSpots}</div><div class="progress-bar"><div class="progress-fill" style="width:0%" data-w="${fillPercent}%"></div></div><button class="btn-signup-large ${isSignedUp ? 'signed' : ''}" id="signupBtn" onclick="toggleSignup()">${isSignedUp ? '✓ You\'re Signed Up!' : '🚀 Sign Up Now'}</button><div class="xp-badge">⚡ Earn ${opp.xpReward} XP on completion</div><div class="share-buttons"><button class="btn-share" onclick="showToast('🔗 Link copied!')">📋 Copy Link</button><button class="btn-share" onclick="showToast('📱 Shared!')">📱 Share</button></div></div></div>`;
  document.getElementById('detailGridContainer').innerHTML = `<div class="detail-grid"><div class="detail-card"><div class="detail-icon">📍</div><div><div class="detail-label">Location</div><div class="detail-value">${opp.location}</div></div></div><div class="detail-card"><div class="detail-icon">📅</div><div><div class="detail-label">Date & Time</div><div class="detail-value">${opp.date}</div><div class="detail-sub">${opp.time}</div></div></div><div class="detail-card"><div class="detail-icon">👥</div><div><div class="detail-label">Volunteers Joined</div><div class="detail-value">${opp.filledSpots} / ${opp.totalSpots}</div><div class="detail-sub">${spotsLeft} more needed</div></div></div><div class="detail-card"><div class="detail-icon">⚡</div><div><div class="detail-label">XP Reward</div><div class="detail-value">+${opp.xpReward} XP</div></div></div></div>`;
  document.getElementById('aboutDesc').textContent = opp.longDescription;
  document.getElementById('skillsList').innerHTML = opp.skills.map((s,i) => `<span class="skill-tag ${i<3?'highlight':''}">${s}</span>`).join('');
  document.getElementById('eventAgenda').innerHTML = opp.agenda.map(item => `<div class="agenda-item"><div class="agenda-time">${item.time}</div><div class="agenda-desc">${item.activity}</div></div>`).join('');
  document.getElementById('volunteersList').innerHTML = opp.volunteers.map(v => `<div class="volunteer-card"><div class="volunteer-avatar" style="background:${v.bg}; color:${v.color}">${v.avatar}</div><div><div class="volunteer-name">${v.name}</div><div class="volunteer-role">${v.role}</div></div></div>`).join('');
  document.getElementById('volunteerCount').textContent = `Showing ${opp.volunteers.length} of ${opp.filledSpots} registered volunteers`;
  setTimeout(() => { document.querySelectorAll('.progress-fill[data-w]').forEach(el => { el.style.width = el.getAttribute('data-w'); }); }, 150);
}

function toggleSignup() {
  if (isSignedUp) { if (confirm('Cancel your signup?')) { isSignedUp = false; currentOpportunity.filledSpots--; renderOpportunityDetails(currentOpportunity); showToast('❌ Signup cancelled'); } }
  else { isSignedUp = true; currentOpportunity.filledSpots++; renderOpportunityDetails(currentOpportunity); showToast(`🎉 Signed up! +${currentOpportunity.xpReward} XP earned`); }
}

function showToast(msg) { const t = document.getElementById('toast'); t.innerHTML = `✅ ${msg}`; t.classList.add('show'); clearTimeout(t._to); t._to = setTimeout(() => t.classList.remove('show'), 2800); }

function updateHeaderUI() {
  const actionsDiv = document.getElementById('headerActions');
  const storedUser = localStorage.getItem('currentUser');
  if (storedUser) {
    currentUser = JSON.parse(storedUser);
    const displayName = currentUser.displayName || (currentUser.profile?.name || 'Volunteer');
    const firstChar = displayName.charAt(0).toUpperCase();
    const accountType = currentUser.accountType === 'individual' ? 'Volunteer' : 'NGO';
    actionsDiv.innerHTML = `<div class="profile-section" id="profileSection"><div class="profile-avatar">${firstChar}</div><div class="profile-info"><div class="profile-name">${displayName.split(' ')[0]}</div><div class="profile-type">${accountType}</div></div><i class="fas fa-chevron-down"></i><div class="profile-dropdown"><div class="dropdown-item" onclick="viewProfile()"><i class="fas fa-user-circle"></i> My Profile</div><div class="dropdown-item" onclick="window.location.href='badges.html'"><i class="fas fa-award"></i> My Badges</div><div class="dropdown-item" onclick="logout()"><i class="fas fa-sign-out-alt"></i> Sign Out</div></div></div>`;
    const ps = document.getElementById('profileSection');
    if(ps){ ps.addEventListener('click',(e)=>{ e.stopPropagation(); ps.classList.toggle('active'); }); document.addEventListener('click',()=>{ ps.classList.remove('active'); }); }
  } else { actionsDiv.innerHTML = `<a href="notification.html" class="notif">🔔<div class="notif-dot"></div></a><a href="post.html" class="btn-sm">Post Need</a><a href="login.html" class="btn-sm">Log In</a><a href="signup.html" class="btn-sm btn-primary">Join Now</a>`; }
}
function viewProfile() { if(currentUser){ const p=currentUser.profile; alert(`📋 Account Details\n\n${currentUser.accountType==='individual'?`Name: ${p.name}\nEmail: ${p.email}\nXP: ${p.xp||80}`:`Organization: ${p.name}\nEmail: ${p.email}`}`); showToast('Profile loaded'); } }
function viewBadges() { showToast('✨ Your Badges: Helper Hero, Seed Volunteer'); }
function logout() { localStorage.removeItem('currentUser'); currentUser=null; updateHeaderUI(); showToast('👋 Logged out'); setTimeout(()=>window.location.reload(),800); }

const urlParams = new URLSearchParams(window.location.search);
const oppId = urlParams.get('id') || 'river-cleanup';
const oppData = OPPORTUNITIES_DB[oppId];
if (oppData) renderOpportunityDetails(oppData);
else document.getElementById('opportunityHero').innerHTML = `<div style="text-align:center;padding:3rem"><div>🔍</div><div>Opportunity Not Found</div><a href="index.html" class="btn-sm btn-primary">← Back to Explore</a></div>`;

updateHeaderUI();
window.addEventListener('scroll', () => { const header = document.querySelector('header'); if(window.scrollY > 20) header.style.background = 'rgba(255, 255, 255, 0.95)'; else header.style.background = 'rgba(255, 255, 255, 0.9)'; });
</script>
</body>
</html>
